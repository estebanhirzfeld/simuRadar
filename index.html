<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Radar IoT ESP - Vista Adaptable Unificada</title>
    <style>
        /* CSS: Prevenir overflow, centrar, respetar áreas seguras y altura dinámica */
        body {
            background-color: #000;
            color: #0f0;
            font-family: monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: calc(15px + env(safe-area-inset-top)) 15px calc(15px + env(safe-area-inset-bottom)) 15px;
            box-sizing: border-box;
            overflow: hidden; /* Previene scroll accidental */
            height: 100dvh; /* Altura dinámica para barras de navegador móviles */
        }
        
        h1 {
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 20px;
        }

        /* Contenedor flexible que ocupa el espacio disponible */
        #canvas-container {
            width: 100%;
            max-width: 1000px; /* Tamaño máximo para PC */
            flex-grow: 1; /* Ocupa el resto del espacio vertical */
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
        }

        canvas {
            border: 1px solid #333;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
            background-color: #000;
            /* Asegura que el canvas se estire si su resolución es menor */
            width: 100%; 
            height: 100%;
            object-fit: contain; /* Mantiene proporciones sin cortar */
        }
    </style>
</head>
<body>

    <h1>Radar Ultrasónico Wi-Fi</h1>
    
    <div id="canvas-container">
        <canvas id="radar"></canvas>
    </div>
    
    <script>
        const canvas = document.getElementById('radar');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvas-container');

        // Variables dinámicas para el renderizado
        let centerX, centerY, maxRadius;
        const maxDistance = 40; 
        const textZoneH = 80; // Altura fija para la zona de texto estable

        let currentAngle = 90;
        let currentDistance = 0;

        // --- SISTEMA RESPONSIVE ADAPTABLE ---
        function resizeCanvas() {
            // El canvas toma el ancho y alto completo de su contenedor
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;

            // Detectar orientación
            const isLandscape = canvas.width > canvas.height;

            if (isLandscape) {
                // Modo Horizontal: Radar a un lado, texto al otro? No, integrada vista semicircular es mejor.
                // Scalaremos por altura para que quepa todo el semicírculo y texto.
                const usableH = canvas.height - textZoneH - 40; // Espacio seguro
                maxRadius = Math.min(canvas.width / 2 - 20, usableH); // El radio que quepa en ambos
                centerX = canvas.width / 2;
                centerY = usableH + 20; // El origen se mueve hacia abajo para dar espacio al texto abajo
            } else {
                // Modo Vertical: Layout stacked (original)
                // Usamos una proporción (aspect ratio) de 2:1 para el semicírculo
                const radarSpaceH = canvas.width / 2;
                maxRadius = canvas.width / 2 - 20;
                centerX = canvas.width / 2;
                centerY = radarSpaceH + 20; 
            }
        }

        // Ejecutar al cargar y cada vez que se gire o cambie el tamaño de la pantalla
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas(); 

        // --- MOTOR DE RENDERIZADO MEJORADO (No Texto Ghosting) ---
        function drawRadar() {
            // PASO 1: Efecto de rastro de fósforo (desvanecimiento) SOLO EN LA ZONA DEL RADAR
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.beginPath();
            // Creamos un semicírculo sobre el área del radar
            ctx.arc(centerX, centerY, maxRadius, Math.PI, 0);
            ctx.fill();

            // PASO 2: LIMPIEZA TOTAL DE LA ZONA DE TEXTO (Previene ghosting y acumulación)
            // Calculamos el área de texto segura (abajo)
            const labelY = canvas.height - textZoneH;
            ctx.fillStyle = '#000'; // Negro absoluto
            ctx.fillRect(0, labelY, canvas.width, textZoneH); // Limpiar un rectángulo seguro

            // PASO 3: DIBUJAR ELEMENTOS DINÁMICOS DEL RADAR
            drawGrid();
            drawScanner(currentAngle);

            if (currentDistance > 0 && currentDistance <= maxDistance) {
                drawObject(currentAngle, currentDistance);
            }

            // PASO 4: DIBUJAR TEXTO ESTÁTICO DENTRO DE LA ZONA LIMPIA
            drawStatusText();

            // Loop de animación
            requestAnimationFrame(drawRadar);
        }

        function drawGrid() {
            ctx.strokeStyle = 'rgba(0, 255, 0, 0.5)';
            ctx.lineWidth = 1;

            for (let i = 1; i <= 4; i++) {
                ctx.beginPath();
                ctx.arc(centerX, centerY, (maxRadius / 4) * i, Math.PI, 0);
                ctx.stroke();
            }

            for (let angle = 30; angle <= 150; angle += 30) {
                const radian = angle * (Math.PI / 180);
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.lineTo(centerX - maxRadius * Math.cos(radian), centerY - maxRadius * Math.sin(radian));
                ctx.stroke();
            }
        }

        function drawScanner(angle) {
            const radian = angle * (Math.PI / 180);
            ctx.strokeStyle = '#0f0';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.lineTo(centerX - maxRadius * Math.cos(radian), centerY - maxRadius * Math.sin(radian));
            ctx.stroke();
        }

        function drawObject(angle, distance) {
            const radian = angle * (Math.PI / 180);
            const distanceInPixels = (distance / maxDistance) * maxRadius; 
            
            const x = centerX - distanceInPixels * Math.cos(radian);
            const y = centerY - distanceInPixels * Math.sin(radian);

            ctx.fillStyle = '#f00';
            ctx.beginPath();
            // El tamaño del punto rojo también escala un poco según el tamaño de la pantalla
            const dotSize = Math.max(3, canvas.width * 0.008); 
            ctx.arc(x, y, dotSize, 0, 2 * Math.PI);
            ctx.fill();
        }

        // --- NUEVA FUNCIÓN: Dibujar el texto de estado ESTÁTICO Y CLARO DENTRO del canvas ---
        function drawStatusText() {
            const status = currentDistance > maxDistance ? "Fuera de rango" : `${currentDistance} cm`;
            const text = `Ángulo: ${currentAngle}° | Distancia: ${status}`;
            
            ctx.fillStyle = '#0f0'; // Mismo verde brillante
            // Usamos una fuente en negrita y monospace, similar a la imagen
            ctx.font = 'bold 1.2rem monospace'; 
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle'; // Centrado vertical en la zona
            
            // Dibujar en el centro de la zona de texto segura, en negro absoluto
            const labelCenterY = canvas.height - textZoneH / 2;
            ctx.fillText(text, centerX, labelCenterY); 
        }

        // --- SIMULACIÓN (Borrar al usar WebSocket real) ---
        function simulateData() {
            let direction = 1;
            setInterval(() => {
                currentAngle += direction * 2;
                if (currentAngle >= 165 || currentAngle <= 15) direction *= -1;
                
                currentDistance = (Math.random() > 0.8) ? Math.floor(Math.random() * 50) : currentDistance;
            }, 50);
        }

        drawRadar();
        simulateData(); 

    </script>
</body>
</html>
