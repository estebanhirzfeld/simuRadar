<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Radar IoT ESP - Vista Unificada y Responsive</title>
    <style>
        /* CSS: Prevenir overflow y centrar el contenido, respetando áreas seguras de móviles */
        body {
            background-color: #000;
            color: #0f0;
            font-family: monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            /* Añade padding seguro para iPhone y otros modernos */
            padding: calc(15px + env(safe-area-inset-top)) 15px calc(15px + env(safe-area-inset-bottom)) 15px;
            box-sizing: border-box;
            overflow: hidden; /* Previene scroll accidental */
            height: 100dvh; /* Usar altura dinámica para ajustarse a barras de navegador */
        }
        
        h1 {
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 20px;
        }

        /* Contenedor que ocupa el espacio disponible */
        #canvas-container {
            width: 100%;
            max-width: 800px; /* Tamaño máximo en PC */
            flex-grow: 1; /* Ocupa el resto del espacio vertical */
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000; /* Coincide con canvas para una vista unificada */
        }

        canvas {
            border: 1px solid #333;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
            background-color: #000;
        }
    </style>
</head>
<body>

    <h1>Radar Ultrasónico Wi-Fi</h1>
    
    <div id="canvas-container">
        <canvas id="radar"></canvas>
    </div>
    
    <script>
        const canvas = document.getElementById('radar');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvas-container');

        // Variables dinámicas para el renderizado
        let centerX, centerY, maxRadius;
        const maxDistance = 40; 

        let currentAngle = 90;
        let currentDistance = 0;

        // --- SISTEMA RESPONSIVE INTEGRADO ---
        function resizeCanvas() {
            // El canvas toma el ancho de su contenedor
            canvas.width = container.clientWidth;
            
            // Calculamos una altura que cubra el radar semicircular Y el texto
            // El radar es medio círculo, así que su altura es el radio.
            const radarSpaceH = canvas.width / 2;
            // Añadimos 80px extra para el texto y márgenes seguros
            canvas.height = radarSpaceH + 80; 

            // Recalcular el centro y el radio basados en la nueva resolución del canvas entero
            centerX = canvas.width / 2;
            centerY = canvas.height - 70; // El origen se mueve hacia arriba para dar espacio al texto abajo
            maxRadius = canvas.width / 2 - 20; // -20px de margen lateral
        }

        // Ejecutar al cargar y cada vez que se gire o cambie el tamaño de la pantalla
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas(); 

        // --- MOTOR DE RENDERIZADO ---
        function drawRadar() {
            // Efecto de rastro de fósforo (desvanecimiento)
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drawGrid();
            drawScanner(currentAngle);

            if (currentDistance > 0 && currentDistance <= maxDistance) {
                drawObject(currentAngle, currentDistance);
            }

            // --- NUEVO: Dibujar el texto de estado DENTRO del canvas ---
            drawStatusText();

            // Loop de animación
            requestAnimationFrame(drawRadar);
        }

        function drawGrid() {
            ctx.strokeStyle = 'rgba(0, 255, 0, 0.5)';
            ctx.lineWidth = 1;

            for (let i = 1; i <= 4; i++) {
                ctx.beginPath();
                ctx.arc(centerX, centerY, (maxRadius / 4) * i, Math.PI, 0);
                ctx.stroke();
            }

            for (let angle = 30; angle <= 150; angle += 30) {
                const radian = angle * (Math.PI / 180);
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.lineTo(centerX - maxRadius * Math.cos(radian), centerY - maxRadius * Math.sin(radian));
                ctx.stroke();
            }
        }

        function drawScanner(angle) {
            const radian = angle * (Math.PI / 180);
            ctx.strokeStyle = '#0f0';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.lineTo(centerX - maxRadius * Math.cos(radian), centerY - maxRadius * Math.sin(radian));
            ctx.stroke();
        }

        function drawObject(angle, distance) {
            const radian = angle * (Math.PI / 180);
            const distanceInPixels = (distance / maxDistance) * maxRadius; 
            
            const x = centerX - distanceInPixels * Math.cos(radian);
            const y = centerY - distanceInPixels * Math.sin(radian);

            ctx.fillStyle = '#f00';
            ctx.beginPath();
            // El tamaño del punto rojo también escala un poco según el tamaño de la pantalla
            const dotSize = Math.max(3, canvas.width * 0.008); 
            ctx.arc(x, y, dotSize, 0, 2 * Math.PI);
            ctx.fill();
        }

        // --- NUEVA FUNCIÓN: Dibujar el texto de estado DENTRO del canvas ---
        function drawStatusText() {
            const status = currentDistance > maxDistance ? "Fuera de rango" : `${currentDistance} cm`;
            const text = `Ángulo: ${currentAngle}° | Distancia: ${status}`;
            
            ctx.fillStyle = '#0f0'; // Mismo verde brillante
            // Usamos una fuente en negrita y monospace, similar a la imagen
            ctx.font = 'bold 1.2rem monospace'; 
            ctx.textAlign = 'center';
            ctx.textBaseline = 'bottom';
            
            // Dibujar en el fondo del canvas, con un pequeño margen seguro de 10px
            ctx.fillText(text, centerX, canvas.height - 10); 
        }

        // --- SIMULACIÓN (Borrar al usar WebSocket real) ---
        function simulateData() {
            let direction = 1;
            setInterval(() => {
                currentAngle += direction * 2;
                if (currentAngle >= 165 || currentAngle <= 15) direction *= -1;
                
                currentDistance = (Math.random() > 0.8) ? Math.floor(Math.random() * 50) : currentDistance;
                // No se necesita updateUI() externo
            }, 50);
        }

        drawRadar();
        simulateData(); 

    </script>
</body>
</html>
